
# kitty_zellij.conf
# Place this in ~/.config/kitty/kitty.conf or include via "include kitty_zellij.conf"

# Window splitting
map ctrl+shift+enter launch --cwd=current
map ctrl+shift+l launch --cwd=current --location=right
map ctrl+shift+h launch --cwd=current --location=left
map ctrl+shift+k launch --cwd=current --location=top
map ctrl+shift+j launch --cwd=current --location=bottom

# Navigate splits
map ctrl+shift+left neighboring_window left
map ctrl+shift+right neighboring_window right
map ctrl+shift+up neighboring_window up
map ctrl+shift+down neighboring_window down

# Resize splits
map ctrl+alt+left resize_window narrower
map ctrl+alt+right resize_window wider
map ctrl+alt+up resize_window taller
map ctrl+alt+down resize_window shorter

# Tabs
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+page_up previous_tab
map ctrl+shift+page_down next_tab

# Close window
map ctrl+shift+f8 close_window

# Tab bar
tab_bar_edge top
active_tab_font_style bold
inactive_tab_font_style italic
tab_title_template "{title}"

# Status bar command (uses shell integration script)
status_format "#(kitty +kitten status_bar)"
